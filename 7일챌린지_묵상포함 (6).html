<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>소나기예배팀 7일 미션</title>
  <style>
    :root { --bg:#eef7ff; --card:#ffffff; --main:#2563eb; --sub:#0f172a; --soft:#dbeafe; --ok:#22c55e; --warn:#f97316; --bad:#ef4444; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:linear-gradient(180deg,#e0f2fe,#f8fafc); color:var(--sub); }
    .wrap { max-width:560px; margin:0 auto; padding:20px 16px 48px; }
    .hero { background:linear-gradient(135deg,#2563eb,#38bdf8); color:white; padding:28px 22px; border-radius:26px; box-shadow:0 12px 30px rgba(37,99,235,.25); text-align:center; }
    .hero .eyebrow { display:inline-block; font-size:12px; font-weight:900; letter-spacing:2px; text-transform:uppercase; background:rgba(255,255,255,.18); padding:5px 14px; border-radius:999px; margin-bottom:10px; }
    .hero h1 { margin:0 0 8px; font-size:30px; line-height:1.2; letter-spacing:.5px; }
    .hero p { margin:0; opacity:.95; font-size:15px; }
    .box { margin-top:16px; background:rgba(255,255,255,.95); padding:16px; border-radius:22px; box-shadow:0 8px 22px rgba(15,23,42,.08); }
    .bar { height:14px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
    .bar > div { height:100%; width:0%; background:linear-gradient(90deg,#22c55e,#3b82f6); transition:.3s; }
    .progress-text { display:flex; justify-content:space-between; margin-top:9px; font-weight:900; }
    .tabs { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin:18px 0; }
    .tab { border:0; padding:10px 0; border-radius:13px; background:white; font-weight:900; color:#64748b; box-shadow:0 3px 10px rgba(15,23,42,.06); }
    .tab.active { background:#2563eb; color:white; }
    .tab.done { background:#dcfce7; color:#166534; }
    .card { display:none; background:var(--card); border-radius:26px; padding:20px; box-shadow:0 10px 28px rgba(15,23,42,.1); }
    .card.active { display:block; }
    .day-title { font-size:24px; font-weight:900; margin:0 0 8px; }
    .mission { background:#f1f5f9; padding:14px; border-radius:18px; line-height:1.55; margin-bottom:16px; }
    .devotion { background:linear-gradient(135deg,#eef2ff,#f0f9ff); border:1.5px solid #bfdbfe; border-radius:18px; padding:14px 16px; margin-bottom:16px; }
    .devotion .d-ref { font-weight:900; color:#1d4ed8; font-size:13px; margin-bottom:4px; }
    .devotion .d-verse { font-weight:900; color:#0f172a; font-size:15px; line-height:1.45; margin-bottom:8px; }
    .devotion .d-note { color:#334155; font-size:13.5px; line-height:1.6; }
    label { display:block; font-weight:900; margin:14px 0 7px; }
    select, textarea { width:100%; border:2px solid #e2e8f0; border-radius:16px; padding:14px; font-size:16px; outline:none; resize:vertical; min-height:52px; background:white; }
    select:focus, textarea:focus { border-color:#60a5fa; }
    select { font-weight:900; }
    .checkline { display:flex; align-items:center; gap:10px; background:#f8fafc; padding:14px; border-radius:16px; margin-top:14px; font-weight:900; }
    input[type=checkbox] { width:22px; height:22px; accent-color:#2563eb; }
    .btns { display:grid; gap:10px; margin-top:18px; }
    button.big { border:0; border-radius:18px; padding:16px; font-size:17px; font-weight:900; cursor:pointer; }
    .share { background:#fee500; color:#191600; }
    .copy { background:#0f172a; color:white; }
    .subbtn { background:#e0f2fe; color:#075985; }
    .reset { background:#fee2e2; color:#991b1b; }
    .status-title { display:flex; justify-content:space-between; gap:10px; align-items:center; font-weight:900; font-size:18px; margin-bottom:10px; }
    .pill { display:inline-flex; align-items:center; border-radius:999px; padding:7px 10px; font-weight:900; font-size:13px; }
    .pill.ok { background:#dcfce7; color:#166534; }
    .pill.bad { background:#fee2e2; color:#991b1b; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { border-radius:999px; padding:9px 12px; font-weight:900; font-size:14px; background:#f1f5f9; color:#334155; }
    .chip.done { background:#dcfce7; color:#166534; }
    .chip.miss { background:#fee2e2; color:#991b1b; }
    .summary-grid { display:grid; gap:9px; }
    .member-row { display:grid; grid-template-columns:72px 1fr auto; align-items:center; gap:8px; font-weight:900; padding:10px; border-radius:16px; background:#f8fafc; }
    .mini-days { display:flex; gap:3px; }
    .mini { width:20px; height:20px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:11px; background:#e2e8f0; color:#475569; }
    .mini.on { background:#22c55e; color:white; }
    .guide { margin-top:18px; background:white; border-radius:22px; padding:16px; color:#334155; line-height:1.55; }
    .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#111827; color:white; padding:12px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:.25s; font-weight:900; z-index:10; }
    .toast.show { opacity:1; bottom:34px; }
    .complete { display:none; margin-top:16px; background:#fff7ed; border:2px solid #fed7aa; border-radius:22px; padding:18px; text-align:center; font-weight:900; }
    .complete.show { display:block; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">Worship Team</span>
      <h1>SONAGI WEEK</h1>
      <p>소통 · 나눔 · 기쁨으로 함께 세워지는 7일 ✨</p>
    </section>

    <section class="box">
      <label style="margin-top:0">🙋 인증 멤버 선택</label>
      <select id="memberSelect"></select>
      <div class="bar" style="margin-top:14px"><div id="memberBar"></div></div>
      <div class="progress-text"><span id="memberCount">0 / 7 완료</span><span id="memberPercent">0%</span></div>
    </section>

    <div class="tabs" id="tabs"></div>

    <section class="box" id="dailyStatus"></section>

    <div id="cards"></div>

    <section class="box">
      <div class="status-title">📊 전체 멤버 완료 현황 <span class="pill" id="totalPill">0%</span></div>
      <div class="summary-grid" id="memberSummary"></div>
      <div class="btns">
        <button class="big subbtn" onclick="copyIncomplete()">📋 미완료 멤버 복사</button>
        <button class="big share" onclick="shareIncomplete()">💬 미완료 현황 카톡 공유</button>
      </div>
    </section>

    <div class="complete" id="complete">🏆 선택한 멤버 7일 미션 완료!<br>하나님께 더 가까이 나아가는 소나기예배팀을 축복합니다.</div>

    <section class="guide">
      <b>⏰ 인증 안내</b><br>
      매일 밤 10시까지 단톡방 인증<br>
      멤버별 완료 여부가 저장되고, 오늘 DAY의 미완료 멤버가 자동으로 표시됩니다.<br>
      공유창이 안 뜨면 “복사” 후 카톡방에 붙여넣으세요.
    </section>
  </div>
  <div class="toast" id="toast">복사되었습니다</div>

<script>
const members = ['강산','김도연','김현희','옥민석','한수영','한수미','한승규'];
let selectedMember = localStorage.getItem('sonagi_member') || members[0];
let current = Number(localStorage.getItem('sonagi_current') || 0);
let data = JSON.parse(localStorage.getItem('sonagi_member_data') || '{}');

const oldData = JSON.parse(localStorage.getItem('sonagi_data') || 'null');
if (oldData && !data[selectedMember]) {
  data[selectedMember] = oldData;
  localStorage.setItem('sonagi_member_data', JSON.stringify(data));
}

// --- Firebase Realtime Database 동기화 (REST API, SDK 불필요) ---
const FB_URL = 'https://sonagi-533f9-default-rtdb.firebaseio.com';
const FB_PATH = '/sonagi_member_data.json';
let syncing = false;

async function fetchRemote(){
  try{
    const res = await fetch(FB_URL + FB_PATH);
    if(!res.ok) return null;
    const remote = await res.json();
    return remote || {};
  }catch(e){ return null; }
}
async function pushRemote(){
  try{
    await fetch(FB_URL + FB_PATH, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
  }catch(e){ /* 오프라인이면 로컬에만 저장됨 */ }
}
async function syncFromRemote(silent){
  if(syncing) return;
  syncing = true;
  const remote = await fetchRemote();
  syncing = false;
  if(remote && JSON.stringify(remote) !== JSON.stringify(data)){
    data = remote;
    localStorage.setItem('sonagi_member_data', JSON.stringify(data));
    render();
  }
}

const missions = [
  {emoji:'📖', title:'말씀', desc:'성경 읽기 + 은혜 받은 말씀 1구절 기록', fields:['오늘 읽은 말씀','은혜 받은 말씀 1구절'],
    devotion:{ref:'출애굽기 4:24-26', verse:'여호와께서 그를 만나사 그를 죽이려 하시므로...', note:'사명의 길 위에 있던 모세를 하나님이 멈춰 세우신 것은 실패가 아니라, 신앙의 본질을 회복시키시려는 은혜의 사인이었습니다. 오늘 말씀 앞에서 잠시 멈춰, 내가 놓치고 있던 본질은 무엇인지 돌아봅니다.'}},
  {emoji:'🙏', title:'기도', desc:'기도제목 1가지 나누기\n팀원들 기도제목으로 기도하기', fields:['오늘의 기도제목','팀원 기도제목을 위해 기도하며 느낀 점'],
    devotion:{ref:'여호수아 5:2-9', verse:'부싯돌로 칼을 만들어 다시 할례를 행하라', note:'여리고 전투를 앞둔 백성에게 하나님은 먼저 정체성을 분명히 하라 명하셨습니다. 문제를 해결하는 능력보다 먼저 "내가 누구에게 속한 자인가"를 붙잡고 기도하는 하루가 되기를 바랍니다.'}},
  {emoji:'🎵', title:'찬양', desc:'찬양 1곡 부르며 가사 묵상하기', fields:['오늘 묵상한 찬양','가사 묵상 한 줄'],
    devotion:{ref:'출애굽기 12:13', verse:'내가 그 피를 볼 때면 너희를 넘으리니', note:'십보라의 할례 사건은 훗날 유월절 어린 양의 피로 구원받는 사건을 예표합니다. 우리의 힘이 아닌 예수 그리스도의 피 흘림의 은혜를 찬양하며, 가사 한 줄 한 줄에 그 은혜를 담아 불러봅니다.'}},
  {emoji:'👣', title:'순종', desc:'하나님이 생각나게 하신 한 가지 실천하기', fields:['오늘 실천한 순종','느낀 점'],
    devotion:{ref:'출애굽기 4:25', verse:'십보라가... 그 아들의 양피를 베어 모세의 발 앞에 던지며', note:'십보라는 망설이지 않고 즉시 행동했습니다. 사명을 감당하느라 미뤄두었던 본질의 회복을, 오늘 작은 순종으로 실천해 봅니다.'}},
  {emoji:'❤️', title:'감사', desc:'감사한 일 2가지 적기', fields:['감사한 일 ①','감사한 일 ②'],
    devotion:{ref:'출애굽기 4:24', verse:'여호와께서 그를 만나사', note:'멈춰 세우심은 포기가 아니라 끝까지 붙잡으시는 사랑입니다. 내 삶의 멈춤과 막힘 속에서도 나를 포기하지 않으신 하나님께 감사한 일들을 떠올려봅니다.'}},
  {emoji:'🤝', title:'섬김', desc:'누군가를 돕거나 섬기기', fields:['누구를 섬겼나요?','어떻게 섬겼나요?'],
    devotion:{ref:'출애굽기 4:26', verse:'할례 때문이었더라', note:'십보라의 섬김(할례)이 모세의 생명을 살렸습니다. 작은 섬김이 누군가의 본질을 살리는 통로가 될 수 있음을 기억하며 오늘 누군가를 섬겨봅니다.'}},
  {emoji:'🔥', title:'예배', desc:'주일예배 일찍 와서 예배 준비하기', fields:['예배를 위해 준비한 것','예배 전 기도 제목'],
    devotion:{ref:'결론 말씀', verse:'우리는 혼자 걷는 것이 아니라 하나님과 함께 걷는 존재입니다', note:'바쁜 일상 속에서 잠시 멈춰 서서 내가 하나님께 속한 백성임을 기억하고, 하나님이 이끄시는 가장 안전한 길로 나아가는 예배자가 되기를 소망합니다.'}}
];

function getMemberData(name){ data[name] ??= {}; return data[name]; }
function getDayData(name, day){ const md=getMemberData(name); md[day] ??= {fields:[],done:false}; return md[day]; }
function save(){ localStorage.setItem('sonagi_member_data', JSON.stringify(data)); localStorage.setItem('sonagi_member', selectedMember); localStorage.setItem('sonagi_current', current); updateAll(); pushRemote(); }
function el(id){ return document.getElementById(id); }
function toast(msg='복사되었습니다'){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }

function render(){
  el('memberSelect').innerHTML = members.map(name=>`<option value="${name}" ${name===selectedMember?'selected':''}>${name}</option>`).join('');
  el('memberSelect').onchange = e => { selectedMember = e.target.value; save(); render(); toast(selectedMember + '님으로 선택되었습니다'); };

  const tabs = el('tabs'), cards = el('cards'); tabs.innerHTML=''; cards.innerHTML='';
  missions.forEach((m,i)=>{
    const tab=document.createElement('button'); tab.className='tab'; tab.textContent=i+1; tab.onclick=()=>{current=i; save(); render();}; tabs.appendChild(tab);
    const dayData = getDayData(selectedMember, i);
    const card=document.createElement('section'); card.className='card';
    card.innerHTML=`
      <h2 class="day-title">DAY ${i+1} ${m.emoji} ${m.title}</h2>
      ${m.devotion ? `<div class="devotion"><div class="d-ref">📖 오늘의 묵상 · ${m.devotion.ref}</div><div class="d-verse">"${m.devotion.verse}"</div><div class="d-note">${m.devotion.note}</div></div>` : ''}
      <div class="mission">${m.desc.replace(/\n/g,'<br>')}</div>
      ${m.fields.map((f,j)=>`<label>${f}</label><textarea data-day="${i}" data-field="${j}" placeholder="${selectedMember}님의 기록을 입력하세요">${dayData.fields[j]||''}</textarea>`).join('')}
      <label class="checkline"><input type="checkbox" data-done="${i}" ${dayData.done?'checked':''}> ${selectedMember} 완료 인증</label>
      <div class="btns">
        <button class="big share" onclick="shareDay(${i})">💬 카톡으로 인증 공유하기</button>
        <button class="big copy" onclick="copyDay(${i})">📋 인증 문구 복사</button>
      </div>`;
    cards.appendChild(card);
  });
  document.querySelectorAll('.tab')[current].classList.add('active');
  document.querySelectorAll('.card')[current].classList.add('active');
  document.querySelectorAll('textarea').forEach(x=>x.oninput=e=>{ const d=e.target.dataset.day, f=e.target.dataset.field; getDayData(selectedMember,d).fields[f]=e.target.value; save(); });
  document.querySelectorAll('[data-done]').forEach(x=>x.onchange=e=>{ const d=e.target.dataset.done; getDayData(selectedMember,d).done=e.target.checked; save(); render(); });
  updateAll();
}

function memberDoneCount(name){ return missions.filter((_,i)=>getDayData(name,i).done).length; }
function dayDoneMembers(day){ return members.filter(name=>getDayData(name,day).done); }
function dayMissingMembers(day){ return members.filter(name=>!getDayData(name,day).done); }

function updateAll(){
  const done = memberDoneCount(selectedMember);
  const pct = Math.round(done/7*100);
  el('memberBar').style.width=pct+'%';
  el('memberCount').textContent=`${selectedMember} ${done} / 7 완료`;
  el('memberPercent').textContent=pct+'%';
  document.querySelectorAll('.tab').forEach((t,i)=>{ t.classList.toggle('done', !!getDayData(selectedMember,i).done); });
  el('complete').classList.toggle('show', done===7);
  renderDailyStatus();
  renderSummary();
}

function renderDailyStatus(){
  const m=missions[current];
  const doneList=dayDoneMembers(current);
  const missList=dayMissingMembers(current);
  el('dailyStatus').innerHTML = `
    <div class="status-title">DAY ${current+1} ${m.emoji} ${m.title} 현황 <span class="pill ${missList.length?'bad':'ok'}">미완료 ${missList.length}명</span></div>
    <div style="font-weight:900;margin:12px 0 7px">✅ 완료 멤버</div>
    <div class="chips">${doneList.length ? doneList.map(n=>`<span class="chip done">${n}</span>`).join('') : '<span class="chip">아직 없음</span>'}</div>
    <div style="font-weight:900;margin:14px 0 7px">❌ 미완료 멤버</div>
    <div class="chips">${missList.length ? missList.map(n=>`<span class="chip miss">${n}</span>`).join('') : '<span class="chip done">전원 완료 🎉</span>'}</div>`;
}

function renderSummary(){
  const totalDone = members.reduce((sum,n)=>sum+memberDoneCount(n),0);
  const totalPct = Math.round(totalDone/(members.length*7)*100);
  el('totalPill').textContent = `${totalPct}%`;
  el('totalPill').className = `pill ${totalPct===100?'ok': totalPct>0?'':'bad'}`;
  el('memberSummary').innerHTML = members.map(name=>{
    const cnt=memberDoneCount(name);
    const minis=missions.map((_,i)=>`<span class="mini ${getDayData(name,i).done?'on':''}">${i+1}</span>`).join('');
    return `<div class="member-row"><span>${name}</span><div class="mini-days">${minis}</div><span>${cnt}/7</span></div>`;
  }).join('');
}

function makeText(i){
  const m=missions[i], dd=getDayData(selectedMember,i), fs=dd.fields||[];
  let lines=[`🌧️ 소나기예배팀 7일 미션 인증`, `🙋 멤버: ${selectedMember}`, `DAY ${i+1} ${m.emoji} ${m.title}`, ``];
  m.fields.forEach((f,j)=>lines.push(`✅ ${f}: ${fs[j]||'작성 전'}`));
  lines.push('', dd.done?'☑️ 완료 인증':'⬜ 아직 진행 중', '', '⏰ 매일 밤 10시까지 단톡방 인증');
  return lines.join('\n');
}
function makeIncompleteText(){
  const m=missions[current], miss=dayMissingMembers(current), done=dayDoneMembers(current);
  return [`🌧️ 소나기예배팀 7일 미션 현황`, `DAY ${current+1} ${m.emoji} ${m.title}`, '', `✅ 완료: ${done.length ? done.join(', ') : '없음'}`, `❌ 미완료: ${miss.length ? miss.join(', ') : '전원 완료 🎉'}`, '', '⏰ 오늘 밤 10시까지 단톡방 인증'].join('\n');
}
async function copyText(text,msg){ try{ await navigator.clipboard.writeText(text); toast(msg || '복사되었습니다'); }catch(e){ toast('복사 실패'); } }
async function copyDay(i){ copyText(makeText(i),'인증 문구가 복사되었습니다'); }
async function shareDay(i){ const text=makeText(i); if(navigator.share){ try{ await navigator.share({title:'소나기예배팀 7일 미션 인증', text}); return; }catch(e){} } copyText(text,'공유창이 안 떠서 문구를 복사했어요'); }
async function copyIncomplete(){ copyText(makeIncompleteText(),'미완료 멤버 현황이 복사되었습니다'); }
async function shareIncomplete(){ const text=makeIncompleteText(); if(navigator.share){ try{ await navigator.share({title:'소나기예배팀 미완료 현황', text}); return; }catch(e){} } copyText(text,'공유창이 안 떠서 현황을 복사했어요'); }
